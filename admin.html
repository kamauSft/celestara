<div class="form-group">
  <label>Design Image</label>

  <div id="drop-zone"
       style="cursor:pointer;border:2px dashed #D4AF37;padding:25px;text-align:center;border-radius:10px;background:rgba(28,26,26,0.6);">

    <p style="margin:0;color:#fff;">Click or drop image to upload</p>
    <p style="margin-top:5px;font-size:12px;color:#D4AF37;">
      JPG • PNG • JPEG (Recommended 1:1 or 4:5 ratio)
    </p>

    <input type="file" id="file-input" accept="image/*" hidden />

    <img id="preview"
         style="max-height:180px;margin-top:15px;border-radius:8px;display:none;" />
  </div>

  <p style="text-align:center;margin:10px 0;color:#888;">OR</p>

  <input
    type="url"
    id="image-url"
    class="url-input"
    placeholder="Paste image path or CDN URL (e.g. images/dinner/1.jpg)"
  />
</div>
