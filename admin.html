<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Curator Studio — Silai Atelier</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --gold:#D4AF37;
      --dark:#0e0e0e;
      --panel:#171717;
      --text:#f5f5f5;
      --muted:#b8b8b8;
      --border:rgba(255,255,255,0.08);
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      background:var(--dark);
      color:var(--text);
      font-family:Inter,sans-serif;
    }

    .admin-page{
      max-width:1200px;
      margin:auto;
      padding:40px 20px;
    }

    /* HEADER */
    .admin-header{
      margin-bottom:40px;
      border-bottom:1px solid rgba(212,175,55,0.2);
      padding-bottom:20px;
    }

    .logo{
      font-family:"Playfair Display",serif;
      color:var(--gold);
      font-size:1.8rem;
      text-decoration:none;
      letter-spacing:2px;
      display:inline-block;
      margin-bottom:10px;
    }

    h1{
      font-family:"Playfair Display",serif;
      font-size:2.2rem;
    }

    p{color:var(--muted);}

    /* GRID */
    .admin-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:30px;
    }

    @media(max-width:900px){
      .admin-grid{grid-template-columns:1fr;}
    }

    .panel{
      background:var(--panel);
      border:1px solid rgba(212,175,55,0.15);
      border-radius:20px;
      padding:30px;
    }

    h2{
      color:var(--gold);
      font-family:"Playfair Display";
      margin-bottom:20px;
    }

    /* FORM */
    .form-group{margin-bottom:18px;}

    label{
      display:block;
      font-size:0.85rem;
      color:var(--gold);
      margin-bottom:6px;
    }

    input,textarea,select{
      width:100%;
      padding:12px;
      background:#0e0e0e;
      border:1px solid var(--border);
      color:var(--text);
      border-radius:8px;
    }

    input:focus,textarea:focus,select:focus{
      outline:none;
      border-color:var(--gold);
    }

    /* UPLOAD */
    .drop-zone{
      border:2px dashed var(--gold);
      padding:25px;
      text-align:center;
      border-radius:12px;
      cursor:pointer;
      background:rgba(0,0,0,0.2);
    }

    .drop-zone:hover{
      background:rgba(212,175,55,0.05);
    }

    img.preview{
      max-height:160px;
      margin-top:15px;
      border-radius:8px;
      display:none;
    }

    /* BUTTONS */
    .btn{
      padding:12px 22px;
      border-radius:40px;
      border:none;
      cursor:pointer;
      font-weight:600;
    }

    .primary{background:var(--gold); color:#000;}
    .danger{background:#c0392b; color:#fff;}
    .secondary{background:#222; color:#fff;}

    .actions{
      display:flex;
      gap:10px;
      margin-top:20px;
      flex-wrap:wrap;
    }

    /* LIST */
    .list{
      display:flex;
      flex-direction:column;
      gap:12px;
      max-height:450px;
      overflow:auto;
    }

    .item{
      display:flex;
      gap:12px;
      background:#0e0e0e;
      padding:10px;
      border-radius:10px;
      align-items:center;
      border:1px solid rgba(255,255,255,0.05);
    }

    .item img{
      width:55px;
      height:55px;
      object-fit:cover;
      border-radius:8px;
    }

    .item h4{
      font-family:"Playfair Display";
      font-size:1rem;
    }

    .item small{
      color:var(--muted);
      font-size:0.75rem;
    }
  </style>
</head>

<body>

<div class="admin-page">

  <div class="admin-header">
    <a class="logo" href="index.html">Silai Atelier</a>
    <h1>Curator Studio</h1>
    <p>Admin-only luxury fashion management system</p>
  </div>

  <div class="admin-grid">

    <!-- FORM -->
    <div class="panel">
      <h2>Add Design</h2>

      <form id="form">

        <div class="form-group">
          <label>Name</label>
          <input id="name" required>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="desc" required></textarea>
        </div>

        <div class="form-group">
          <label>Price</label>
          <input id="price" type="number" required>
        </div>

        <div class="form-group">
          <label>Category</label>
          <select id="cat">
            <option>dinner</option>
            <option>casual</option>
            <option>bridal</option>
            <option>beach</option>
            <option>ankara</option>
            <option>business</option>
            <option>twopiece</option>
          </select>
        </div>

        <div class="form-group">
          <label>Upload Image</label>

          <div class="drop-zone" id="drop">
            Click to upload image
            <input type="file" id="file" hidden>
            <img id="preview" class="preview">
          </div>

          <input id="url" placeholder="or paste image URL">
        </div>

        <div class="actions">
          <button class="btn primary">Save</button>
          <button type="reset" class="btn secondary">Clear</button>
        </div>

      </form>
    </div>

    <!-- LIST -->
    <div class="panel">
      <h2>Collection</h2>
      <div class="list" id="list"></div>

      <div class="actions">
        <button class="btn danger" id="reset">Reset All</button>
      </div>
    </div>

  </div>
</div>

<script>
let imgData="";

const file=document.getElementById("file");
const drop=document.getElementById("drop");
const preview=document.getElementById("preview");

drop.onclick=()=>file.click();

file.onchange=e=>{
  const r=new FileReader();
  r.onload=ev=>{
    imgData=ev.target.result;
    preview.src=imgData;
    preview.style.display="block";
  };
  r.readAsDataURL(file.files[0]);
};

const form=document.getElementById("form");
const list=document.getElementById("list");

function load(){
  const data=JSON.parse(localStorage.getItem("p")||"[]");
  list.innerHTML="";
  data.forEach((d,i)=>{
    list.innerHTML+=`
      <div class="item">
        <img src="${d.img}">
        <div>
          <h4>${d.name}</h4>
          <small>${d.cat} - KES ${d.price}</small>
        </div>
        <button onclick="del(${i})" class="btn danger">X</button>
      </div>
    `;
  });
}

form.onsubmit=e=>{
  e.preventDefault();

  const data=JSON.parse(localStorage.getItem("p")||"[]");

  data.push({
    name:form.name.value,
    desc:form.desc.value,
    price:form.price.value,
    cat:form.cat.value,
    img:imgData||form.url.value
  });

  localStorage.setItem("p",JSON.stringify(data));

  form.reset();
  preview.style.display="none";
  imgData="";

  load();
};

window.del=i=>{
  const d=JSON.parse(localStorage.getItem("p")||"[]");
  d.splice(i,1);
  localStorage.setItem("p",JSON.stringify(d));
  load();
};

document.getElementById("reset").onclick=()=>{
  localStorage.removeItem("p");
  load();
};

load();
</script>

</body>
</html>
