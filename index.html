<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Curator Studio — Silai Atelier</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --gold:#D4AF37;
      --dark:#0e0e0e;
      --soft:#171717;
      --text:#f5f5f5;
      --muted:#b8b8b8;
    }

    body{
      font-family:'Inter',sans-serif;
      background:var(--dark);
      color:var(--text);
      overflow-x:hidden;
    }

    /* ================= RESTORED HEADER STYLE ================= */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;

      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 24px 8%;

      background: rgba(0,0,0,.45);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .logo {
      font-family: 'Playfair Display',serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: var(--gold);
      text-decoration: none;
    }

    .studio-title {
      font-family: 'Inter', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
      text-align: center;
    }

    .studio-tagline {
      color: var(--muted);
      font-size: .95rem;
      font-weight: 400;
      text-align: right;
    }

    /* ================= MAIN CONTAINER WRAPPER ================= */
    .admin-container {
      max-width: 1400px;
      margin: 140px auto 60px; /* Pushes content below the fixed header */
      padding: 0 8%;
    }

    .back-nav {
      margin-bottom: 30px;
    }

    .back-nav a {
      color: var(--gold);
      text-decoration: none;
      font-size: 0.95rem;
      transition: .3s;
    }

    .back-nav a:hover {
      text-decoration: underline;
    }

    /* ================= TWO-COLUMN GRID LAYOUT ================= */
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .admin-panel {
      background: var(--soft);
      border: 1px solid rgba(212,175,55,.12);
      border-radius: 24px;
      padding: 40px;
    }

    .admin-panel h2 {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 1.8rem;
      margin-bottom: 25px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 15px;
    }

    /* ================= MANAGEMENT FORM FIELDS ================= */
    .form-group {
      margin-bottom: 22px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--gold);
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 14px;
      background: var(--dark);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      box-sizing: border-box;
    }

    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none;
      border-color: var(--gold);
    }

    /* ================= DRAG AND DROP CONTAINER ================= */
    .drop-zone {
      cursor: pointer;
      border: 2px dashed var(--gold);
      padding: 30px 20px;
      text-align: center;
      border-radius: 12px;
      background: rgba(0,0,0,0.3);
      transition: all 0.3s ease;
    }

    .drop-zone:hover {
      background: rgba(212, 175, 55, 0.04);
    }

    .url-input {
      margin-top: 12px;
    }

    .form-actions {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    /* ================= DASHBOARD ACTIONS ================= */
    .btn {
      padding: 14px 28px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      border: none;
    }

    .btn-primary {
      background: var(--gold);
      color: #111;
    }

    .btn-primary:hover {
      background: #e7c04b;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.2);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .btn-danger {
      background: #b33939;
      color: #fff;
    }

    .btn-danger:hover {
      background: #d63031;
    }

    /* ================= LIVE LOOKBOOK MODULE ================= */
    .product-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-height: 480px;
      overflow-y: auto;
      margin-bottom: 20px;
      padding-right: 5px;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 15px;
      background: var(--dark);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.04);
    }

    .list-item img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
    }

    .list-item-details {
      flex: 1;
    }

    .list-item-details h4 {
      margin: 0 0 4px 0;
      font-family: 'Playfair Display', serif;
      color: var(--text);
    }

    .list-item-details p {
      margin: 0;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
    }

    .admin-tip {
      font-size: 0.85rem;
      color: #666;
      margin-top: 20px;
      font-style: italic;
    }

    /* ================= RESPONSIVE ADAPTATIONS ================= */
    @media (max-width: 900px) {
      header {
        padding: 20px 6%;
        flex-direction: column;
        gap: 10px;
        text-align: center;
      }
      .studio-tagline {
        text-align: center;
      }
      .admin-container {
        margin-top: 220px;
        padding: 0 6%;
      }
      .admin-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <header>
    <a href="index.html" class="logo">Silai Atelier</a>
    <div class="studio-title">Curator Studio</div>
    <div class="studio-tagline">Luxury tailoring dashboard — manage your fashion collection</div>
  </header>

  <div class="admin-container">
    
    <div class="back-nav">
      <a href="index.html">← Back to Silai Atelier</a>
    </div>

    <div class="admin-grid">

      <section class="admin-panel">
        <h2>Add / Edit Design</h2>

        <form id="product-form">
          <div class="form-group">
            <label for="name">Design Name</label>
            <input type="text" id="name" required placeholder="Executive Navy Suit" />
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" required placeholder="Luxury tailoring details..." rows="3"></textarea>
          </div>

          <div class="form-group">
            <label for="price">Price (KES)</label>
            <input type="number" id="price" required min="0" placeholder="18000" />
          </div>

          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" required>
              <option value="dinner">Dinner / Evening Wear</option>
              <option value="casual">Casual Luxury</option>
              <option value="bridal">Bridal Couture</option>
              <option value="beach">Beach / Resort Wear</option>
              <option value="ankara">Traditional / Ankara</option>
              <option value="business">Business / Official Wear</option>
              <option value="twopiece">Two Piece Sets</option>
            </select>
          </div>

          <div class="form-group">
            <label>Design Image</label>
            <div class="drop-zone" id="drop-zone">
              <div id="drop-zone-prompt">
                <p style="margin: 0; font-weight: 500;">Click to upload local photo</p>
                <p style="margin: 5px 0 0 0; font-size: 0.85em; color: #D4AF37;">Supports PNG, JPG, JPEG</p>
              </div>
              <input type="file" id="file-input" accept="image/*" style="display: none;" />
              <img id="preview" alt="Preview Thumbnail" style="max-height: 150px; max-width: 100%; margin-top: 15px; border-radius: 8px; display: none; margin-left: auto; margin-right: auto;" />
            </div>

            <div style="text-align: center; margin: 12px 0; color: #555; font-size: 0.85rem;">— OR —</div>

            <input type="text" id="image-url" class="url-input" placeholder="Or paste local path (e.g. images/suit.jpg)" />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Design</button>
            <button type="reset" class="btn btn-secondary" id="reset-form">Clear</button>
          </div>
        </form>
      </section>

      <section class="admin-panel">
        <h2>Lookbook Collection</h2>
        <div class="product-list" id="product-list">
          </div>

        <div class="form-actions">
          <button type="button" class="btn btn-danger" id="reset-all">Reset Collection</button>
        </div>

        <p class="admin-tip">Your uploads instantly update the live storefront lookbook.</p>
      </section>

    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const fileInput = document.getElementById('file-input');
      const imageUrlInput = document.getElementById('image-url');
      const previewImg = document.getElementById('preview');
      const dropZone = document.getElementById('drop-zone');
      const dropZonePrompt = document.getElementById('drop-zone-prompt');
      const productForm = document.getElementById('product-form');
      const productList = document.getElementById('product-list');
      const resetAllBtn = document.getElementById('reset-all');

      let uploadedImageBase64 = "";

      dropZone.addEventListener('click', () => fileInput.click());

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            uploadedImageBase64 = event.target.result;
            previewImg.src = uploadedImageBase64;
            previewImg.style.display = "block";
            dropZonePrompt.style.display = "none";
            imageUrlInput.value = "";
          };
          reader.readAsDataURL(file);
        }
      });

      function renderAdminCollection() {
        productList.innerHTML = "";
        const products = JSON.parse(localStorage.getItem("products") || "[]");

        if (products.length === 0) {
          productList.innerHTML = `<p style="color:#666; font-style:italic; padding: 20px 0;">No uploaded items found in the current session. Storefront defaults are active.</p>`;
          return;
        }

        products.forEach((prod, index) => {
          const item = document.createElement("div");
          item.className = "list-item";
          item.innerHTML = `
            <img src="${prod.image}" alt="${prod.name}">
            <div class="list-item-details">
              <h4>${prod.name}</h4>
              <p>${prod.category} — KES ${Number(prod.price).toLocaleString()}</p>
            </div>
            <button class="btn btn-danger" style="padding: 6px 12px; font-size: 0.75rem; border-radius: 4px;" onclick="deleteProduct(${index})">Remove</button>
          `;
          productList.appendChild(item);
        });
      }

      productForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const finalImage = uploadedImageBase64 || imageUrlInput.value.trim();

        if (!finalImage) {
          alert("Please select a photo file or enter an image path reference.");
          return;
        }

        const newProduct = {
          name: document.getElementById('name').value.trim(),
          description: document.getElementById('description').value.trim(),
          price: document.getElementById('price').value.trim(),
          category: document.getElementById('category').value,
          image: finalImage
        };

        const currentProducts = JSON.parse(localStorage.getItem("products") || "[]");
        currentProducts.push(newProduct);
        localStorage.setItem("products", JSON.stringify(currentProducts));

        productForm.reset();
        uploadedImageBase64 = "";
        previewImg.style.display = "none";
        dropZonePrompt.style.display = "block";

        renderAdminCollection();
      });

      window.deleteProduct = (index) => {
        const currentProducts = JSON.parse(localStorage.getItem("products") || "[]");
        currentProducts.splice(index, 1);
        localStorage.setItem("products", JSON.stringify(currentProducts));
        renderAdminCollection();
      };

      resetAllBtn.addEventListener('click', () => {
        if (confirm("Are you sure you want to clear your uploaded lookbook collection memory?")) {
          localStorage.removeItem("products");
          renderAdminCollection();
        }
      });

      renderAdminCollection();
    });
  </script>
</body>
</html>
